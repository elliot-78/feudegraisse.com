<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vidéographie</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

/* retro window style */
.window{
    background:#2b2b2b;
    padding:20px;
    border:3px solid #555;
    width:600px;
}

video{
    width:100%;
    border:2px solid #000;
}
</style>
</head>

<body>

<div class="window">

    <video controls>
        <source src="video.mp4" type="video/mp4">
    </video>

</div>

</body>
</html>
