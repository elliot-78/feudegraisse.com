<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vidéographie</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New", monospace;
}

/* WINDOW */
.window {
    width: 700px;
    background: #c0c0c0;
    border: 4px solid #808080;
    box-shadow: 6px 6px 0 #000;
}

/* TITLE BAR */
.titlebar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    padding: 6px 10px;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* VIDEO AREA */
.screen {
    background: black;
    padding: 10px;
}

video {
    width: 100%;
    border: 2px inset #999;
}

/* CONTROLS */
.controls {
    display: flex;
    gap: 10px;
    padding: 10px;
    background: #c0c0c0;
    align-items: center;
}

button {
    background: #e0e0e0;
    border: 2px outset #fff;
    padding: 5px 10px;
    cursor: pointer;
    font-family: inherit;
}

button:active {
    border: 2px inset #fff;
}

.bar {
    flex: 1;
    height: 10px;
    background: #888;
    border: 2px inset #ddd;
    position: relative;
}

.progress {
    height: 100%;
    width: 0%;
    background: #00ffcc;
}

</style>
</head>

<body>

<div class="window">

    <div class="titlebar">
        <div>Windows Media Player - Retro Edition</div>
        <div>_ □ ✕</div>
    </div>

    <div class="screen">
        <video id="video">
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="controls">
        <button onclick="playVideo()">▶</button>
        <button onclick="pauseVideo()">⏸</button>

        <div class="bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

</div>

<script>
const video = document.getElementById("video");
const progress = document.getElementById("progress");

function playVideo() {
    video.play();
}

function pauseVideo() {
    video.pause();
}

video.addEventListener("timeupdate", () => {
    const percent = (video.currentTime / video.duration) * 100;
    progress.style.width = percent + "%";
});
</script>
